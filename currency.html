<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #0b3d2e; /* forest green */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        select, input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        .swap-btn {
            background: #f5e8c8;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            margin: 10px 0;
        }

        .swap-btn:hover {
            background: #f0dfb5;
        }

        button.convert-btn {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
        }

        button.convert-btn:hover {
            background-color: #f0dfb5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            background-color: #f5e8c8;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #f0dfb5;
        }
    </style>
</head>

<body>

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

    <div class="container">
        <h2>Currency Converter</h2>

        <input type="number" id="amount" placeholder="Enter amount">

        <!-- FROM CURRENCY -->
        <select id="fromCurrency">
            <option value="USD">🇺🇸 USD - US Dollar</option>
            <option value="EUR">🇪🇺 EUR - Euro</option>
            <option value="GBP">🇬🇧 GBP - British Pound</option>
            <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
            <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
            <option value="CAD">🇨🇦 CAD - Canadian Dollar</option>
            <option value="CHF">🇨🇭 CHF - Swiss Franc</option>
            <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
            <option value="INR">🇮🇳 INR - Indian Rupee</option>
            <option value="BRL">🇧🇷 BRL - Brazilian Real</option>
            <option value="ZAR">🇿🇦 ZAR - South African Rand</option>
            <option value="MXN">🇲🇽 MXN - Mexican Peso</option>
            <option value="SEK">🇸🇪 SEK - Swedish Krona</option>
            <option value="NOK">🇳🇴 NOK - Norwegian Krone</option>
            <option value="TRY">🇹🇷 TRY - Turkish Lira</option>
        </select>

        <!-- SWAP BUTTON -->
        <button class="swap-btn" onclick="swapCurrencies()">↕</button>

        <!-- TO CURRENCY -->
        <select id="toCurrency">
            <option value="EUR">🇪🇺 EUR - Euro</option>
            <option value="USD">🇺🇸 USD - US Dollar</option>
            <option value="GBP">🇬🇧 GBP - British Pound</option>
            <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
            <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
            <option value="CAD">🇨🇦 CAD - Canadian Dollar</option>
            <option value="CHF">🇨🇭 CHF - Swiss Franc</option>
            <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
            <option value="INR">🇮🇳 INR - Indian Rupee</option>
            <option value="BRL">🇧🇷 BRL - Brazilian Real</option>
            <option value="ZAR">🇿🇦 ZAR - South African Rand</option>
            <option value="MXN">🇲🇽 MXN - Mexican Peso</option>
            <option value="SEK">🇸🇪 SEK - Swedish Krona</option>
            <option value="NOK">🇳🇴 NOK - Norwegian Krone</option>
            <option value="TRY">🇹🇷 TRY - Turkish Lira</option>
        </select>

        <button class="convert-btn" onclick="convert()">Convert</button>

        <h3 id="result"></h3>
    </div>

    <script>
        function swapCurrencies() {
            let from = document.getElementById("fromCurrency");
            let to = document.getElementById("toCurrency");

            let temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        async function convert() {
            const amount = document.getElementById("amount").value;
            const from = document.getElementById("fromCurrency").value;
            const to = document.getElementById("toCurrency").value;

            if (!amount) {
                document.getElementById("result").innerText = "Enter an amount first";
                return;
            }

            const url = `https://api.exchangerate-api.com/v4/latest/${from}`;
            const response = await fetch(url);
            const data = await response.json();

            const rate = data.rates[to];
            const converted = (amount * rate).toFixed(2);

            document.getElementById("result").innerText =
                `${amount} ${from} = ${converted} ${to}`;
        }
    </script>

</body>
</html>
