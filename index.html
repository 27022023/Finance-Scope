<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Scope</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            font-family: Arial, sans-serif;

            /* Soft grey background */
            background: #dcdcdc;
            overflow: hidden;
        }

        /* Title */
        .title {
            margin-top: 40px;
            font-size: 3rem;
            font-weight: 700;
            color: #0A1A2F; /* deep navy blue */
            text-align: center;
        }

        /* Bank image placeholder with engraved gold text */
        .bank-image {
            width: 260px;
            height: 180px;
            background: #ffffff;
            border: 4px solid #b5b5b5;
            border-radius: 10px;
            margin-top: 20px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bank-image::before {
            content: "FINANCE SCOPE";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 700;
            color: #d4af37; /* gold */
            text-shadow: 
                0 0 3px #b8860b,
                0 0 6px #b8860b,
                inset 0 0 5px #b8860b;
        }

        /* Menu button */
        .menu-btn {
            position: absolute;
            bottom: 30px;
            padding: 15px 25px;
            background-color: #FFF5E1; /* cream */
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Menu panel */
        #menuPanel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 60%;
            background-color: #FFF5E1; /* cream */
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            transition: bottom 0.4s ease;
            padding: 20px;
        }

        #menuPanel h2 {
            margin-top: 0;
            color: #0A1A2F;
            text-align: center;
        }

        .menu-item {
            padding: 12px;
            margin: 10px 0;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <!-- Title -->
    <div class="title">FINANCE SCOPE</div>

    <!-- Bank image with engraved gold logo -->
    <div class="bank-image"></div>

    <!-- Menu button -->
    <button class="menu-btn" onclick="openMenu()">
        Menu
    </button>

    <!-- Slide-up Menu -->
    <div id="menuPanel">
        <h2>Menu</h2>

        <div class="menu-item" onclick="location.href='currency.html'">Currency Converter</div>
        <div class="menu-item" onclick="location.href='brutto-netto.html'">Brutto–Netto Calculator</div>
        <div class="menu-item" onclick="location.href='expenses.html'">Expense Tracker</div>
        <div class="menu-item" onclick="location.href='receipts.html'">Receipt Upload</div>
        <div class="menu-item" onclick="location.href='shopping-list.html'">Shopping List</div>
        <div class="menu-item" onclick="location.href='bills.html'">Bills & Payments</div>
        <div class="menu-item" onclick="location.href='goals.html'">Savings Goals</div>
    </div>

    <script>
        const menu = document.getElementById("menuPanel");

        function openMenu() {
            menu.style.bottom = "0";
        }

        function closeMenu() {
            menu.style.bottom = "-100%";
        }

        /* Swipe Detection */
        let startY = 0;
        let endY = 0;

        document.addEventListener("touchstart", function(e) {
            startY = e.touches[0].clientY;
        });

        document.addEventListener("touchend", function(e) {
            endY = e.changedTouches[0].clientY;

            let swipeDistance = startY - endY;

            if (swipeDistance > 80) {
                openMenu();
            }

            if (swipeDistance < -80) {
                closeMenu();
            }
        });
    </script>

</body>
</html>
