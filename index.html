<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Scope</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #d9d9d9, #b3b8d9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* HUGE BANK EMOJI */
        .big-emoji {
            font-size: 260px; /* MASSIVE */
            filter: drop-shadow(0 0 25px rgba(0,0,0,0.4))
                    drop-shadow(0 0 40px rgba(255,255,255,0.6));
            margin-bottom: 40px;
        }

        /* BIGGER MENU BUTTON */
        .swipe-btn {
            position: absolute;
            bottom: 40px;
            background-color: #f5e8c8;
            padding: 25px 45px; /* MUCH BIGGER */
            border-radius: 40px;
            border: none;
            font-size: 1.6rem; /* BIGGER TEXT */
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        .swipe-btn:hover {
            background-color: #f0dfb5;
        }

        /* MENU PANEL */
        #menu {
            position: absolute;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background-color: #f5e8c8;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            padding: 30px;
            transition: right 0.4s ease;
        }

        #menu h2 {
            margin-top: 0;
        }

        .menu-item {
            margin: 20px 0;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

    <!-- HUGE BANK EMOJI -->
    <div class="big-emoji">🏦</div>

    <!-- BIG MENU BUTTON -->
    <button class="swipe-btn" onclick="openMenu()">
        💸 Swipe to see the menu!
    </button>

    <div id="menu">
        <h2>Menu</h2>
        <div class="menu-item"><a href="currency.html">Currency Converter</a></div>
        <div class="menu-item"><a href="brutto-netto.html">Brutto-Netto Calculator</a></div>
        <div class="menu-item"><a href="expenses.html">Expense Tracker</a></div>
        <div class="menu-item"><a href="shopping-list.html">Shopping List</a></div>
        <div class="menu-item"><a href="bills.html">Bills Checklist</a></div>
    </div>

    <script>
        function openMenu() {
            document.getElementById("menu").style.right = "0";
        }

        // Swipe detection
        let startX = 0;

        document.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", e => {
            let endX = e.changedTouches[0].clientX;
            if (startX < endX - 50) {
                openMenu();
            }
        });
    </script>

</body>
</html>
