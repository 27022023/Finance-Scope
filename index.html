<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Scope</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #d9d9d9, #b3b8d9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* NAVY LOGO TEXT ABOVE BANK */
        .logo-text {
            font-size: 40px;
            font-weight: 700;
            color: #0a1a3d; /* deep navy */
            margin-bottom: 10px;
            text-shadow: 0 0 12px rgba(255,255,255,0.7);
        }

        /* HUGE BANK EMOJI */
        .big-emoji {
            font-size: 300px; /* EVEN BIGGER */
            filter: drop-shadow(0 0 25px rgba(0,0,0,0.4))
                    drop-shadow(0 0 40px rgba(255,255,255,0.6));
            margin-bottom: 60px;
        }

        /* BIG NORMAL MENU BUTTON */
        .menu-btn {
            background-color: #f5e8c8;
            padding: 25px 50px;
            border-radius: 40px;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            position: absolute;
            bottom: 40px;
        }

        .menu-btn:hover {
            background-color: #f0dfb5;
        }

        /* MENU PANEL */
        #menu {
            position: absolute;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background-color: #f5e8c8;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            padding: 30px;
            transition: right 0.4s ease;
        }

        #menu h2 {
            margin-top: 0;
        }

        .menu-item {
            margin: 20px 0;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

    <!-- NAVY LOGO TEXT -->
    <div class="logo-text">Finance Scope</div>

    <!-- HUGE BANK EMOJI -->
    <div class="big-emoji">🏦</div>

    <!-- BIG MENU BUTTON -->
    <button class="menu-btn" onclick="openMenu()">
        Menu
    </button>

    <!-- SLIDE-OUT MENU -->
    <div id="menu">
        <h2>Menu</h2>
        <div class="menu-item"><a href="currency.html">Currency Converter</a></div>
        <div class="menu-item"><a href="brutto-netto.html">Brutto-Netto Calculator</a></div>
        <div class="menu-item"><a href="expenses.html">Expense Tracker</a></div>
        <div class="menu-item"><a href="shopping-list.html">Shopping List</a></div>
        <div class="menu-item"><a href="bills.html">Bills Checklist</a></div>
    </div>

    <script>
        function openMenu() {
            document.getElementById("menu").style.right = "0";
        }
    </script>

</body>
</html>
