<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon_1775767952709.png">
    <link rel="apple-touch-icon" href="icon_1775767952709.png">
    <title>Brutto-Netto Calculator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #0a1a3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        select, input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        button {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #f0dfb5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            background-color: #f5e8c8;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #f0dfb5;
        }

        .checkbox, .small-row {
            margin-top: 10px;
            font-size: 1.05rem;
        }

        .small-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: 8px auto;
        }

        .small-row label {
            flex: 1;
            text-align: left;
        }

        .small-row select, .small-row input {
            flex: 1;
            width: auto;
            margin: 0;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 0.95rem;
        }

        /* INFO ICON */
        .info-icon {
            display: inline-block;
            margin-left: 10px;
            background: #f5e8c8;
            color: #0a1a3d;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: bold;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
        }

        /* INFO POPUP */
        .info-box {
            display: none;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.95rem;
            text-align: left;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
    </style>
</head>

<body>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

    <div class="container">
        <h2>
            Brutto → Netto Calculator
            <span class="info-icon" onclick="toggleInfo()">!</span>
        </h2>

        <div id="infoBox" class="info-box">
            <strong>Brutto:</strong> Your salary before taxes and social contributions.<br><br>
            <strong>Netto:</strong> The amount you actually receive in your bank account after all deductions.
        </div>

        <input type="number" id="brutto" placeholder="Enter Brutto salary">

        <div class="small-row">
            <label for="period">Period:</label>
            <select id="period">
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>

        <div class="small-row">
            <label for="taxClass">Tax Class:</label>
            <select id="taxClass">
                <option value="1">Steuerklasse I</option>
                <option value="2">Steuerklasse II</option>
                <option value="3">Steuerklasse III</option>
                <option value="4">Steuerklasse IV</option>
                <option value="5">Steuerklasse V</option>
                <option value="6">Steuerklasse VI</option>
            </select>
        </div>

        <div class="small-row">
            <label for="children">Children:</label>
            <input type="number" id="children" min="0" value="0">
        </div>

        <label class="checkbox">
            <input type="checkbox" id="churchTax"> Kirchensteuer (Church Tax)
        </label>

        <button onclick="calculateNetto()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function toggleInfo() {
            const box = document.getElementById("infoBox");
            const isOpen = box.style.display === "block";

            box.style.display = isOpen ? "none" : "block";

            if (!isOpen) {
                document.addEventListener("click", outsideClickHandler);
            }
        }

        function outsideClickHandler(event) {
            const box = document.getElementById("infoBox");
            const icon = document.querySelector(".info-icon");

            if (!box.contains(event.target) && !icon.contains(event.target)) {
                box.style.display = "none";
                document.removeEventListener("click", outsideClickHandler);
            }
        }

        function calculateNetto() {
            const bruttoInput = parseFloat(document.getElementById("brutto").value);
            const period = document.getElementById("period").value;
            const taxClass = document.getElementById("taxClass").value;
            const children = parseInt(document.getElementById("children").value) || 0;
            const church = document.getElementById("churchTax").checked;

            if (!bruttoInput) {
                document.getElementById("result").innerText = "Enter a Brutto amount first";
                return;
            }

            const bruttoMonthly = period === "yearly" ? bruttoInput / 12 : bruttoInput;

            const health = bruttoMonthly * 0.079;
            const pension = bruttoMonthly * 0.093;
            const unemployment = bruttoMonthly * 0.0125;
            const care = bruttoMonthly * 0.01525;

            const socialTotal = health + pension + unemployment + care;

            let baseRate = 0.20;
            if (taxClass == 2) baseRate = 0.18;
            if (taxClass == 3) baseRate = 0.12;
            if (taxClass == 5) baseRate = 0.28;
            if (taxClass == 6) baseRate = 0.32;

            const childReduction = Math.min(children * 0.01, 0.05);
            const effectiveRate = Math.max(baseRate - childReduction, 0.05);

            const incomeTax = bruttoMonthly * effectiveRate;
            const soli = incomeTax * 0.055;
            const churchTaxAmount = church ? incomeTax * 0.08 : 0;

            const totalDeductions = socialTotal + incomeTax + soli + churchTaxAmount;
            const nettoMonthly = bruttoMonthly - totalDeductions;

            const factor = period === "yearly" ? 12 : 1;

            document.getElementById("result").innerHTML = `
                <strong>Period:</strong> ${period === "monthly" ? "Monthly" : "Yearly"}<br><br>
                <strong>Brutto:</strong> €${(bruttoMonthly * factor).toFixed(2)}<br>
                <strong>Netto:</strong> €${(nettoMonthly * factor).toFixed(2)}<br><br>
                <strong>Total Deductions:</strong> €${(totalDeductions * factor).toFixed(2)}<br><br>
                <strong>Breakdown:</strong><br>
                Health Insurance: €${(health * factor).toFixed(2)}<br>
                Pension Insurance: €${(pension * factor).toFixed(2)}<br>
                Unemployment Insurance: €${(unemployment * factor).toFixed(2)}<br>
                Nursing Care: €${(care * factor).toFixed(2)}<br>
                Income Tax: €${(incomeTax * factor).toFixed(2)}<br>
                Solidarity: €${(soli * factor).toFixed(2)}<br>
                Church Tax: €${(churchTaxAmount * factor).toFixed(2)}<br>
                Children (rate reduction): ${(childReduction * 100).toFixed(1)}%
            `;
        }
    </script>

</body>
</html>
