<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon_1775767952709.png">
    <title>Brutto-Netto Calculator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #0a1a3d; /* deep navy */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        select, input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        button {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #f0dfb5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            background-color: #f5e8c8;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #f0dfb5;
        }

        .checkbox, .small-row {
            margin-top: 10px;
            font-size: 1.05rem;
        }

        .small-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: 8px auto;
        }

        .small-row label {
            flex: 1;
            text-align: left;
        }

        .small-row select, .small-row input {
            flex: 1;
            width: auto;
            margin: 0;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

    <div class="container">
        <h2>Brutto → Netto Calculator</h2>

        <input type="number" id="brutto" placeholder="Enter Brutto salary">

        <div class="small-row">
            <label for="period">Period:</label>
            <select id="period">
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>

        <div class="small-row">
            <label for="taxClass">Tax Class:</label>
            <select id="taxClass">
                <option value="1">Steuerklasse I</option>
                <option value="2">Steuerklasse II</option>
                <option value="3">Steuerklasse III</option>
                <option value="4">Steuerklasse IV</option>
                <option value="5">Steuerklasse V</option>
                <option value="6">Steuerklasse VI</option>
            </select>
        </div>

        <div class="small-row">
            <label for="children">Children:</label>
            <input type="number" id="children" min="0" value="0">
        </div>

        <label class="checkbox">
            <input type="checkbox" id="churchTax"> Kirchensteuer (Church Tax)
        </label>

        <button onclick="calculateNetto()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateNetto() {
            const bruttoInput = parseFloat(document.getElementById("brutto").value);
            const period = document.getElementById("period").value;
            const taxClass = document.getElementById("taxClass").value;
            const children = parseInt(document.getElementById("children").value) || 0;
            const church = document.getElementById("churchTax").checked;

            if (!bruttoInput) {
                document.getElementById("result").innerText = "Enter a Brutto amount first";
                return;
            }

            // Normalize to monthly for calculation
            const bruttoMonthly = period === "yearly" ? bruttoInput / 12 : bruttoInput;

            // Social contributions (approx realistic)
            const health = bruttoMonthly * 0.079;      // 7.9%
            const pension = bruttoMonthly * 0.093;     // 9.3%
            const unemployment = bruttoMonthly * 0.0125; // 1.25%
            const care = bruttoMonthly * 0.01525;      // 1.525%

            const socialTotal = health + pension + unemployment + care;

            // Base income tax rate by tax class (simplified)
            let baseRate = 0.20;
            if (taxClass == 1) baseRate = 0.20;
            if (taxClass == 2) baseRate = 0.18;
            if (taxClass == 3) baseRate = 0.12;
            if (taxClass == 4) baseRate = 0.20;
            if (taxClass == 5) baseRate = 0.28;
            if (taxClass == 6) baseRate = 0.32;

            // Child reduction (very simplified: each child reduces effective tax rate slightly)
            const childReduction = Math.min(children * 0.01, 0.05); // max 5% reduction
            const effectiveRate = Math.max(baseRate - childReduction, 0.05);

            const incomeTax = bruttoMonthly * effectiveRate;

            // Solidarity surcharge
            const soli = incomeTax * 0.055;

            // Church tax
            const churchTaxAmount = church ? incomeTax * 0.08 : 0;

            const totalDeductions = socialTotal + incomeTax + soli + churchTaxAmount;
            const nettoMonthly = bruttoMonthly - totalDeductions;

            // Convert back to selected period
            const factor = period === "yearly" ? 12 : 1;
            const bruttoFinal = bruttoMonthly * factor;
            const nettoFinal = nettoMonthly * factor;
            const healthFinal = health * factor;
            const pensionFinal = pension * factor;
            const unemploymentFinal = unemployment * factor;
            const careFinal = care * factor;
            const incomeTaxFinal = incomeTax * factor;
            const soliFinal = soli * factor;
            const churchFinal = churchTaxAmount * factor;
            const totalDeductionsFinal = totalDeductions * factor;

            document.getElementById("result").innerHTML = `
                <strong>Period:</strong> ${period === "monthly" ? "Monthly" : "Yearly"}<br><br>
                <strong>Brutto:</strong> €${bruttoFinal.toFixed(2)}<br>
                <strong>Netto:</strong> €${nettoFinal.toFixed(2)}<br><br>
                <strong>Total Deductions:</strong> €${totalDeductionsFinal.toFixed(2)}<br><br>
                <strong>Breakdown:</strong><br>
                Health Insurance: €${healthFinal.toFixed(2)}<br>
                Pension Insurance: €${pensionFinal.toFixed(2)}<br>
                Unemployment Insurance: €${unemploymentFinal.toFixed(2)}<br>
                Nursing Care: €${careFinal.toFixed(2)}<br>
                Income Tax: €${incomeTaxFinal.toFixed(2)}<br>
                Solidarity: €${soliFinal.toFixed(2)}<br>
                Church Tax: €${churchFinal.toFixed(2)}<br>
                Children (rate reduction): ${(childReduction * 100).toFixed(1)}% off tax rate
            `;
        }
    </script>

</body>
</html>
