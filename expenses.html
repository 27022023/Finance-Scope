<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #4b0e1f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            width: 90%;
            margin: 10px 0;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 90%;
            margin: 10px auto;
        }

        input[type="number"] {
            flex: 1;
        }

        select {
            width: 90px;
        }

        button {
            padding: 10px 20px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .expense-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: left;
        }

        .delete-btn {
            background: #ff6b6b;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            margin-top: 8px;
        }

        .receipt-btn {
            background: #f5e8c8;
            color: #4b0e1f;
            border: none;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 6px;
            margin-right: 6px;
        }

        #total {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .file-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <div class="row">
        <input type="number" id="amount" placeholder="Amount">
        <select id="currency"></select>
    </div>

    <input type="text" id="name" placeholder="Expense name">
    <input type="date" id="date">

    <div>
        <label class="file-label">Receipt (optional):</label><br>
        <input type="file" id="receiptInput" accept="image/*">
    </div>

    <button onclick="addExpense()">Add Expense</button>

    <div id="expenseList"></div>

    <div id="total">Total: €0.00</div>
</div>

<script>
    const currencies = ["EUR","USD","GBP","CHF","JPY","CNY","TRY","PLN","SEK","NOK","DKK","AUD","CAD"];
    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
    let selectedCurrency = localStorage.getItem("currency_exp") || "EUR";
    let rates = {};

    async function loadRates() {
        const res = await fetch(`https://api.exchangerate.host/latest?base=EUR`);
        const data = await res.json();
        rates = data.rates;
    }

    function populateCurrencyDropdown() {
        const dropdown = document.getElementById("currency");
        dropdown.innerHTML = "";
        currencies.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.textContent = c;
            if (c === selectedCurrency) opt.selected = true;
            dropdown.appendChild(opt);
        });
    }

    function convertAllExpenses(newCurrency) {
        const factor = rates[newCurrency] / rates[selectedCurrency];
        expenses = expenses.map(e => ({ ...e, amount: e.amount * factor }));
        selectedCurrency = newCurrency;
        localStorage.setItem("currency_exp", selectedCurrency);
        saveExpenses();
        renderExpenses();
    }

    document.getElementById("currency").addEventListener("change", e => {
        convertAllExpenses(e.target.value);
    });

    function saveExpenses() {
        localStorage.setItem("expenses", JSON.stringify(expenses));
    }

    function updateTotal() {
        let total = expenses.reduce((sum, item) => sum + item.amount, 0);
        document.getElementById("total").innerText = `Total: ${selectedCurrency} ${total.toFixed(2)}`;
    }

    function renderExpenses() {
        const list = document.getElementById("expenseList");
        list.innerHTML = "";

        expenses.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "expense-item";

            let receiptButton = "";
            if (item.receipt) {
                receiptButton = `<button class="receipt-btn" onclick="viewReceipt(${index})">View receipt</button>`;
            }

            div.innerHTML = `
                <strong>${item.name}</strong><br>
                ${selectedCurrency} ${item.amount.toFixed(2)}<br>
                <small>${item.date}</small><br>
                ${receiptButton}
                <button class="delete-btn" onclick="deleteExpense(${index})">Delete</button>
            `;

            list.appendChild(div);
        });

        updateTotal();
    }

    function addExpense() {
        const amount = parseFloat(document.getElementById("amount").value);
        const name = document.getElementById("name").value;
        const date = document.getElementById("date").value || "No date";
        const fileInput = document.getElementById("receiptInput");
        const file = fileInput.files[0];

        if (!amount || !name) {
            alert("Enter name and amount");
            return;
        }

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const receiptData = e.target.result;
                pushExpense(amount, name, date, receiptData);
            };
            reader.readAsDataURL(file);
        } else {
            pushExpense(amount, name, date, null);
        }
    }

    function pushExpense(amount, name, date, receiptData) {
        expenses.unshift({ name, amount, date, receipt: receiptData });
        saveExpenses();
        renderExpenses();

        document.getElementById("amount").value = "";
        document.getElementById("name").value = "";
        document.getElementById("date").value = "";
        document.getElementById("receiptInput").value = "";
    }

    function deleteExpense(index) {
        expenses.splice(index, 1);
        saveExpenses();
        renderExpenses();
    }

    function viewReceipt(index) {
        const exp = expenses[index];
        if (exp && exp.receipt) {
            const win = window.open();
            win.document.write(`<img src="${exp.receipt}" style="max-width:100%;height:auto;">`);
        }
    }

    function importFromShoppingList() {
        let imported = JSON.parse(localStorage.getItem("importExpenses")) || [];

        if (imported.length > 0) {
            imported.forEach(item => {
                const fromCurrency = item.currency || "EUR";
                const factor = rates[selectedCurrency] / rates[fromCurrency];
                let convertedAmount = item.amount * factor;

                expenses.unshift({
                    name: item.name,
                    amount: convertedAmount,
                    date: item.date,
                    receipt: null
                });
            });

            localStorage.removeItem("importExpenses");
            saveExpenses();
        }
    }

    (async () => {
        await loadRates();
        populateCurrencyDropdown();
        importFromShoppingList();
        renderExpenses();
    })();
</script>

</body>
</html>
