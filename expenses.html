<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #4b0e1f; /* deep burgundy */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        button {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #f0dfb5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            background-color: #f5e8c8;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #f0dfb5;
        }

        .expense-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
        }

        .delete-btn {
            background: #ff6b6b;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            margin-top: 8px;
        }

        .delete-btn:hover {
            background: #ff4a4a;
        }

        .receipt-img {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
        }

        #total {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

    <div class="container">
        <h2>Expense Tracker</h2>

        <input type="text" id="name" placeholder="Expense name">
        <input type="number" id="amount" placeholder="Amount (€)">
        
        <select id="category">
            <option value="General">General</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
        </select>

        <input type="date" id="date">

        <label style="margin-top:10px;">Upload Receipt:</label>
        <input type="file" id="receipt" accept="image/*">

        <button onclick="addExpense()">Add Expense</button>

        <h3 style="margin-top:20px;">Filter by Month</h3>
        <select id="monthFilter" onchange="renderExpenses()">
            <option value="all">All</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <div id="expenseList"></div>

        <div id="total">Total: €0.00</div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

        function saveExpenses() {
            localStorage.setItem("expenses", JSON.stringify(expenses));
        }

        function updateTotal(filtered) {
            let total = filtered.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById("total").innerText = `Total: €${total.toFixed(2)}`;
        }

        function renderExpenses() {
            const list = document.getElementById("expenseList");
            list.innerHTML = "";

            const filter = document.getElementById("monthFilter").value;

            const filtered = expenses.filter(item => {
                if (filter === "all") return true;
                return item.date.slice(5, 7) === filter;
            });

            filtered.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "expense-item";

                div.innerHTML = `
                    <strong>${item.name}</strong><br>
                    €${item.amount.toFixed(2)} — ${item.category}<br>
                    <small>${item.date}</small><br>
                `;

                if (item.receipt) {
                    const img = document.createElement("img");
                    img.src = item.receipt;
                    img.className = "receipt-img";
                    div.appendChild(img);
                }

                const del = document.createElement("button");
                del.className = "delete-btn";
                del.innerText = "Delete";
                del.onclick = () => deleteExpense(index);

                div.appendChild(del);
                list.appendChild(div);
            });

            updateTotal(filtered);
        }

        function addExpense() {
            const name = document.getElementById("name").value;
            const amount = parseFloat(document.getElementById("amount").value);
            const category = document.getElementById("category").value;
            const date = document.getElementById("date").value || "No date";
            const receiptFile = document.getElementById("receipt").files[0];

            if (!name || !amount) {
                alert("Please enter a name and amount");
                return;
            }

            if (receiptFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveExpense(name, amount, category, date, e.target.result);
                };
                reader.readAsDataURL(receiptFile);
            } else {
                saveExpense(name, amount, category, date, null);
            }
        }

        function saveExpense(name, amount, category, date, receipt) {
            expenses.push({ name, amount, category, date, receipt });
            saveExpenses();
            renderExpenses();

            document.getElementById("name").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("receipt").value = "";
        }

        function deleteExpense(index) {
            expenses.splice(index, 1);
            saveExpenses();
            renderExpenses();
        }

        renderExpenses();
    </script>

</body>
</html>
