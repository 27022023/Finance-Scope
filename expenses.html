<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #4b0e1f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        button {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
        }

        .expense-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: left;
        }

        .delete-btn {
            background: #ff6b6b;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            margin-top: 8px;
        }

        #total {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

<div class="container">
    <h2>Expense Tracker</h2>

    <input type="number" id="brutto" placeholder="Enter expense amount (€)">
    <input type="text" id="name" placeholder="Expense name">
    <input type="date" id="date">

    <button onclick="addExpense()">Add Expense</button>

    <div id="expenseList"></div>

    <div id="total">Total: €0.00</div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    function saveExpenses() {
        localStorage.setItem("expenses", JSON.stringify(expenses));
    }

    function updateTotal() {
        let total = expenses.reduce((sum, item) => sum + item.amount, 0);
        document.getElementById("total").innerText = `Total: €${total.toFixed(2)}`;
    }

    function renderExpenses() {
        const list = document.getElementById("expenseList");
        list.innerHTML = "";

        expenses.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "expense-item";

            div.innerHTML = `
                <strong>${item.name}</strong><br>
                €${item.amount.toFixed(2)}<br>
                <small>${item.date}</small><br>
                <button class="delete-btn" onclick="deleteExpense(${index})">Delete</button>
            `;

            list.appendChild(div);
        });

        updateTotal();
    }

    function addExpense() {
        const amount = parseFloat(document.getElementById("brutto").value);
        const name = document.getElementById("name").value;
        const date = document.getElementById("date").value || "No date";

        if (!amount || !name) {
            alert("Enter name and amount");
            return;
        }

        expenses.unshift({ name, amount, date });
        saveExpenses();
        renderExpenses();

        document.getElementById("brutto").value = "";
        document.getElementById("name").value = "";
    }

    function deleteExpense(index) {
        expenses.splice(index, 1);
        saveExpenses();
        renderExpenses();
    }

    function importFromShoppingList() {
        let imported = JSON.parse(localStorage.getItem("importExpenses")) || [];

        if (imported.length > 0) {
            imported.forEach(item => expenses.unshift(item));
            localStorage.removeItem("importExpenses");
            saveExpenses();
        }
    }

    importFromShoppingList();
    renderExpenses();
</script>

</body>
</html>
