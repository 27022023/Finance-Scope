<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #5a1a77;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background: #f5e8c8;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: #4b0e1f;
            font-weight: bold;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
            margin-top: 50px;
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 90%;
            margin: 10px auto;
        }

        input {
            flex: 1;
        }

        select {
            width: 90px;
        }

        button {
            padding: 15px 30px;
            background-color: #f5e8c8;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .item, .wishlist-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: left;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #ff6b6b;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        #total {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='index.html'">⬅ Menu</button>

<div class="container">
    <h2>Shopping List</h2>

    <input type="text" id="store" placeholder="Store (optional)">
    <input type="text" id="itemName" placeholder="Item name">

    <div class="row">
        <input type="number" id="price" placeholder="Price (optional)">
        <select id="currency"></select>
    </div>

    <button onclick="addItem()">Add Item</button>

    <div id="list"></div>

    <div id="total">Total: 0.00</div>

    <button onclick="sendToExpenses()">Send Checked Items to Expenses</button>
    <button onclick="shareList()">Share List</button>

    <hr style="margin: 25px 0; border: 1px solid rgba(255,255,255,0.3);">

    <h2>Wish List</h2>

    <input type="text" id="wishInput" placeholder="Wish item">
    <button onclick="addWish()">Add to Wish List</button>

    <div id="wishList"></div>
</div>

<script>
    const currencies = ["EUR","USD","GBP","CHF","JPY","CNY","TRY","PLN","SEK","NOK","DKK","AUD","CAD"];
    let items = JSON.parse(localStorage.getItem("shoppingItems")) || [];
    let wishes = JSON.parse(localStorage.getItem("wishList")) || [];
    let selectedCurrency = localStorage.getItem("currency") || "EUR";
    let rates = {};

    async function loadRates() {
        const res = await fetch(`https://api.exchangerate.host/latest?base=EUR`);
        const data = await res.json();
        rates = data.rates;
    }

    function populateCurrencyDropdown() {
        const dropdown = document.getElementById("currency");
        dropdown.innerHTML = "";
        currencies.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.textContent = c;
            if (c === selectedCurrency) opt.selected = true;
            dropdown.appendChild(opt);
        });
    }

    function convertAllPrices(newCurrency) {
        const factor = rates[newCurrency] / rates[selectedCurrency];
        items = items.map(i => ({ ...i, price: i.price ? i.price * factor : null }));
        selectedCurrency = newCurrency;
        localStorage.setItem("currency", selectedCurrency);
        save();
        render();
    }

    document.getElementById("currency").addEventListener("change", e => {
        convertAllPrices(e.target.value);
    });

    function save() {
        localStorage.setItem("shoppingItems", JSON.stringify(items));
        localStorage.setItem("wishList", JSON.stringify(wishes));
    }

    function updateTotal() {
        let total = items.reduce((sum, item) => sum + (item.price || 0), 0);
        document.getElementById("total").innerText = `Total: ${selectedCurrency} ${total.toFixed(2)}`;
    }

    function render() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        items.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "item";

            let priceLine = item.price ? `<small>${selectedCurrency} ${item.price.toFixed(2)}</small><br>` : "";

            div.innerHTML = `
                <input type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleCheck(${index})">
                <strong>${item.name}</strong><br>
                ${item.store ? `<small>Store: ${item.store}</small><br>` : ""}
                ${priceLine}
                <button class="delete-btn" onclick="deleteItem(${index})">Delete</button>
            `;

            list.appendChild(div);
        });

        updateTotal();
        renderWishes();
    }

    function addItem() {
        const name = document.getElementById("itemName").value;
        const store = document.getElementById("store").value;
        const priceValue = document.getElementById("price").value;
        const price = priceValue ? parseFloat(priceValue) : null;

        if (!name) {
            alert("Enter item name");
            return;
        }

        items.push({ name, store, price, checked: false });
        save();
        render();

        document.getElementById("itemName").value = "";
        document.getElementById("store").value = "";
        document.getElementById("price").value = "";
    }

    function toggleCheck(index) {
        items[index].checked = !items[index].checked;
        save();
        render();
    }

    function deleteItem(index) {
        items.splice(index, 1);
        save();
        render();
    }

    async function shareList() {
        let text = "My Shopping List:\n\n";
        items.forEach(item => {
            text += `• ${item.name}`;
            if (item.store) text += ` (${item.store})`;
            if (item.price) text += ` — ${selectedCurrency} ${item.price.toFixed(2)}`;
            text += "\n";
        });

        if (navigator.share) {
            await navigator.share({ title: "Shopping List", text });
        } else {
            navigator.clipboard.writeText(text);
            alert("List copied to clipboard!");
        }
    }

    function sendToExpenses() {
        const checkedItems = items.filter(i => i.checked && i.price);

        if (checkedItems.length === 0) {
            alert("No priced items checked!");
            return;
        }

        const today = new Date().toISOString().split("T")[0];
        let imported = JSON.parse(localStorage.getItem("importExpenses")) || [];

        checkedItems.forEach(item => {
            imported.push({
                name: item.name,
                amount: item.price,
                category: item.store || "Shopping",
                date: today,
                currency: selectedCurrency
            });
        });

        localStorage.setItem("importExpenses", JSON.stringify(imported));
        alert(`${checkedItems.length} items sent to Expense Tracker!`);
    }

    function addWish() {
        const wish = document.getElementById("wishInput").value;
        if (!wish) return;

        wishes.push(wish);
        save();
        renderWishes();

        document.getElementById("wishInput").value = "";
    }

    function renderWishes() {
        const wishList = document.getElementById("wishList");
        wishList.innerHTML = "";

        wishes.forEach((wish, index) => {
            const div = document.createElement("div");
            div.className = "wishlist-item";

            div.innerHTML = `
                ${wish}
                <button class="delete-btn" onclick="deleteWish(${index})">Delete</button>
            `;

            wishList.appendChild(div);
        });
    }

    function deleteWish(index) {
        wishes.splice(index, 1);
        save();
        renderWishes();
    }

    (async () => {
        await loadRates();
        populateCurrencyDropdown();
        render();
    })();
</script>

</body>
</html>
